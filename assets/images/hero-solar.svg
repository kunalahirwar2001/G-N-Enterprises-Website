    <path d="M20 680 L1210 515" stroke="#22c55e" stroke-width="2" opacity="0.12"/>
    <path d="M144 490 L1110 355" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  </g>
  <g transform="translate(145 490) skewY(-9)">
    <g>
      <polygon points="0,80 250,25 332,185 68,246" fill="url(#panel)" stroke="#7dd3fc" stroke-opacity="0.35"/>
      <path d="M42 72 L107 220 M91 61 L158 208 M140 50 L209 196 M189 39 L260 185" stroke="#94a3b8" stroke-opacity="0.4"/>
      <path d="M32 113 L277 61 M48 151 L295 100 M64 190 L312 139" stroke="#94a3b8" stroke-opacity="0.35"/>
    </g>
    <g transform="translate(360 12)">
      <polygon points="0,80 250,25 332,185 68,246" fill="url(#panel)" stroke="#7dd3fc" stroke-opacity="0.35"/>
