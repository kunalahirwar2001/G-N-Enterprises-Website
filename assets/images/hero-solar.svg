<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">Solar panels at sunrise</title>
  <desc id="desc">A futuristic solar farm with warm sunlight and a dark premium energy background.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#10251e"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" x2="1">
      <stop offset="0" stop-color="#fff7ad"/>
      <stop offset="0.55" stop-color="#ffc107"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="900" fill="url(#sky)"/>
  <circle cx="894" cy="255" r="130" fill="url(#sun)" filter="url(#glow)" opacity="0.95"/>
  <path d="M0 526 C220 430 350 474 520 420 C770 342 980 410 1280 302 L1280 900 L0 900 Z" fill="#08111d" opacity="0.82"/>
